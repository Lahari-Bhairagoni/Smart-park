<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Confirmed | SmartPark</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">

  <script defer src="../js/confirmation.js"></script>
</head>
<body>

<header class="navbar">
  <div class="container">
    <div class="logo">
      <span>SmartPark</span>
      <small class="text-muted">Intelligent Mobility</small>
    </div>
  </div>
</header>

<main class="page">
  <div class="container">

    <div class="card text-center" style="max-width:520px;margin:auto">
      <h2 style="color:var(--success)">Booking Confirmed</h2>
      <p class="text-muted mt-10">
        Your parking slot has been successfully reserved.
      </p>

      <div class="card soft mt-20 text-left">
        <p><strong>Slot:</strong> <span id="cSlot">-</span></p>
        <p><strong>Vehicle:</strong> <span id="cVehicle">-</span></p>
        <p><strong>Duration:</strong> <span id="cDuration">-</span></p>
        <p><strong>Amount Paid:</strong> <span id="cAmount">-</span></p>
      </div>

      <div class="mt-30">
        <a href="parking.html" class="btn btn-outline">Book Another Slot</a>
        <a href="index.html" class="btn btn-primary" style="margin-left:10px">
          Go to Home
        </a>
      </div>
    </div>

  </div>
</main>

<footer class="footer">
  <div class="container">
    <div>SmartPark Virtual Parking System</div>
    <div>© 2024 SmartPark</div>
  </div>
</footer>
<script>
const user = localStorage.getItem("userEmail");

if (!user) {
  alert("Please login first");
  window.location.href = "index.html";
}
</script>

</body>
</html>
